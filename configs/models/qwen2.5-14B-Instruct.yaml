# Qwen2.5-14B
model:
  swiglu: true
  num_layers: 48
  hidden_size: 5120
  ffn_hidden_size: 13824
  num_attention_heads: 40
  group_query_attention: true
  num_query_groups: 8
  use_rotary_position_embeddings: true
  disable_bias_linear: true
  add_qkv_bias: true
  normalization: RMSNorm
  norm_epsilon: 1e-6
  rotary_base: 1000000
  vocab_size: 152064
  untie_embeddings_and_output_weights: true
