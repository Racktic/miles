# Base config for UDA SWE-agent FSDP experiments.
# All FSDP exp*.yaml files include this. Override per-experiment values as needed.

cluster:
  actor_num_gpus_per_node: 8
  colocate: true

training:
  train_backend: fsdp
  micro_batch_size: 1
  gradient_checkpointing: true
  attn_implementation: flash_attention_2
  update_weight_buffer_size: 536870912  # 512MB
  log_probs_chunk_size: 4096

data:
  input_key: prompt
  metadata_key: metadata
  rollout_shuffle: true
  num_rollout: 3000

rollout:
  rollout_temperature: 1.0
  rollout_max_response_len: 4096
  rollout_skip_special_tokens: true
  rollout_health_check_first_wait: 60

algorithm:
  advantage_estimator: grpo
  entropy_coef: 0.00
  eps_clip: 0.2
  eps_clip_high: 0.28

optimizer:
  optimizer: adam
  lr_decay_style: constant
  weight_decay: 0.1
  adam_beta1: 0.9
  adam_beta2: 0.98

sglang:
  sglang_enable_metrics: true
  router_policy: round_robin

agent:
  agent_step_timeout: 600
  agent_eval_timeout: 600
  agent_env_timeout: 120
  agent_create_timeout: 600
  custom_generate_function_path: generate_with_swe_agent.generate
  custom_rm_path: generate_with_swe_agent.reward_func
  rollout_function_path: generate_with_swe_agent.generate_rollout
  dynamic_sampling_filter_path: generate_with_swe_agent.dynamic_filter
