# Base config for UDA SWE-agent Megatron experiments.
# All exp*.yaml files include this. Override per-experiment values as needed.

cluster:
  actor_num_gpus_per_node: 8
  colocate: true

data:
  input_key: prompt
  metadata_key: metadata
  rollout_shuffle: true
  num_rollout: 3000

rollout:
  rollout_temperature: 1.0
  rollout_max_response_len: 4096
  rollout_skip_special_tokens: true
  rollout_health_check_first_wait: 60

training:
  balance_data: true
  sequence_parallel: true
  pipeline_model_parallel_size: 1
  expert_tensor_parallel_size: 1
  recompute_granularity: full
  recompute_method: uniform
  recompute_num_layers: 1
  micro_batch_size: 1
  attention_dropout: 0.0
  hidden_dropout: 0.0
  accumulate_allreduce_grads_in_fp32: true
  attention_softmax_in_fp32: true
  attention_backend: flash
  log_probs_chunk_size: 8192

algorithm:
  advantage_estimator: grpo
  entropy_coef: 0.00
  eps_clip: 0.2
  eps_clip_high: 0.28

optimizer:
  optimizer: adam
  lr_decay_style: constant
  weight_decay: 0.1
  adam_beta1: 0.9
  adam_beta2: 0.98
  optimizer_cpu_offload: true
  overlap_cpu_optimizer_d2h_h2d: true
  use_precision_aware_optimizer: true

sglang:
  sglang_enable_metrics: true

agent:
  agent_step_timeout: 600
  agent_eval_timeout: 600
  agent_env_timeout: 120
  agent_create_timeout: 600
  custom_generate_function_path: generate_with_swe_agent.generate
  custom_rm_path: generate_with_swe_agent.reward_func
  rollout_function_path: generate_with_swe_agent.generate_rollout
  dynamic_sampling_filter_path: generate_with_swe_agent.dynamic_filter
